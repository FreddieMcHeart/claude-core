name: release

on:
  workflow_run:
    workflows: ["portability"]
    types: [completed]

# Repo went public and a branch ruleset with required status checks was added
# on main (2026-07). The ruleset's bypass is scoped to the RepositoryRole:Admin
# role, which the default GITHUB_TOKEN's github-actions[bot] identity isn't
# covered by — its version-bump push gets GH013-rejected. Same failure downbeat
# hit; same fix: a fine-grained PAT (Contents: read/write, this repo only)
# stored as the RELEASE_TOKEN secret, used for both checkout and the release
# push/API calls.
permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install python-semantic-release
        run: python3 -m pip install --quiet --upgrade pip python-semantic-release

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          semantic-release version
          semantic-release publish
