name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Which surface is affected?
      options:
        - cost-discipline hook
        - install.sh / doctor.sh / bootstrap.sh
        - Plugin install (.claude-plugin/, marketplace.json)
        - A specific skill (models-router, delegation-discipline, claude-cost-audit)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cat .claude-plugin/plugin.json | grep version`, or the tag/commit you're on
      placeholder: "0.2.2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include exact commands run if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `./install.sh --migrate-to-plugin`
        2. `claude plugin install claude-core-hooks@claude-core-local`
        3. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste terminal output (e.g. `doctor.sh` output); no need for backticks, it will be auto-formatted.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS + Python version
      placeholder: "macOS 15, Python 3.12"
    validations:
      required: false
